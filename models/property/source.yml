version: 2

sources:
  - name: orders
    description: >
      Source containing raw customer order data ingested from external systems.
      This data resides in the landing schema and is used as the base for further transformations.

    database: "{{ target.database }}"
    schema: landing

    tables:
      - name: cust_order
        identifier: raw_customer_order
        description: >
          Raw customer order data including customer, item, and transaction details.
          This table is used as the primary input for order-related transformations.

        columns:
          - name: order_id
            description: "Unique identifier for each order."

          - name: line_num
            description: "Line number representing individual items within an order."

          - name: customer_id
            description: "Unique identifier for the customer placing the order."

          - name: customer_name
            description: "Name of the customer."

          - name: customer_email
            description: "Email address of the customer."

          - name: customer_phone
            description: "Phone number of the customer."

          - name: city_name
            description: "City where the customer is located."

          - name: item_id
            description: "Unique identifier for the item ordered."

          - name: item_name
            description: "Name of the item."

          - name: variant_name
            description: "Variant or version of the item."

          - name: fuel_type
            description: "Fuel type associated with the item."

          - name: warehouse_name
            description: "Warehouse fulfilling the order."

          - name: order_date
            description: "Date when the order was placed."

          - name: quantity
            description: "Number of units ordered."

          - name: unit_price
            description: "Price per unit of the item."

  - name: items
    description: >
      Source containing raw inventory data of items.
      Used for building item dimension and enrichment transformations.

    database: "{{ target.database }}"
    schema: landing

    tables:
      - name: inventory
        identifier: raw_inventory
        description: >
          Raw inventory dataset containing item metadata such as category, fuel type, and variant details.

        columns:
          - name: item_id
            description: "Unique identifier for each item."

          - name: item_name
            description: "Name of the item."

          - name: category
            description: "Category of the item (e.g., SUV, Sedan, Truck)."

          - name: variant_name
            description: "Variant or model of the item."

          - name: fuel_type
            description: "Fuel type associated with the item."

  - name: warehouse_loc
    description: >
      Source containing warehouse location reference data.
      Used for enriching warehouse-related dimensions.

    database: "{{ target.database }}"
    schema: raw

    tables:
      - name: warehouse
        identifier: WAREHOUSE_LOCATION
        description: >
          Reference table containing warehouse location details including city, state, and region.

        columns:
          - name: warehouse_name
            description: "Name or identifier of the warehouse."

          - name: city_name
            description: "City where the warehouse is located."

          - name: state_name
            description: "State where the warehouse is located."

          - name: region
            description: "Geographical region of the warehouse."